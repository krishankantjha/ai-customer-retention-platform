# Feature and Target Column Names Configuration for RetainIQ

target_column: "Churn"

key_column: "customerID"

categorical_columns:
  - "gender"
  - "MultipleLines"
  - "InternetService"
  - "OnlineSecurity"
  - "OnlineBackup"
  - "DeviceProtection"
  - "TechSupport"
  - "StreamingTV"
  - "StreamingMovies"
  - "Contract"
  - "PaymentMethod"

binary_columns:
  - "SeniorCitizen"
  - "Partner"
  - "Dependents"
  - "PhoneService"
  - "PaperlessBilling"

numeric_columns:
  - "tenure"
  - "MonthlyCharges"
  - "TotalCharges"

# Database-to-CSV column mappings (snake_case -> CamelCase/PascalCase)
database_column_mapping:
  customer_id: "customerID"
  gender: "gender"
  senior_citizen: "SeniorCitizen"
  partner: "Partner"
  dependents: "Dependents"
  tenure: "tenure"
  phone_service: "PhoneService"
  multiple_lines: "MultipleLines"
  internet_service: "InternetService"
  online_security: "OnlineSecurity"
  online_backup: "OnlineBackup"
  device_protection: "DeviceProtection"
  tech_support: "TechSupport"
  streaming_tv: "StreamingTV"
  streaming_movies: "StreamingMovies"
  contract: "Contract"
  paperless_billing: "PaperlessBilling"
  payment_method: "PaymentMethod"
  monthly_charges: "MonthlyCharges"
  total_charges: "TotalCharges"
  churn: "Churn"

# Allowed categorical level domains to enforce boundary validation in DataValidator
categorical_domains:
  gender:
    - "Male"
    - "Female"
  MultipleLines:
    - "Yes"
    - "No"
    - "No phone service"
  InternetService:
    - "DSL"
    - "Fiber optic"
    - "No"
  OnlineSecurity:
    - "Yes"
    - "No"
    - "No internet service"
  OnlineBackup:
    - "Yes"
    - "No"
    - "No internet service"
  DeviceProtection:
    - "Yes"
    - "No"
    - "No internet service"
  TechSupport:
    - "Yes"
    - "No"
    - "No internet service"
  StreamingTV:
    - "Yes"
    - "No"
    - "No internet service"
  StreamingMovies:
    - "Yes"
    - "No"
    - "No internet service"
  Contract:
    - "Month-to-month"
    - "One year"
    - "Two year"
  PaymentMethod:
    - "Electronic check"
    - "Mailed check"
    - "Bank transfer (automatic)"
    - "Credit card (automatic)"
  Partner:
    - "Yes"
    - "No"
  Dependents:
    - "Yes"
    - "No"
  PhoneService:
    - "Yes"
    - "No"
  PaperlessBilling:
    - "Yes"
    - "No"
  Churn:
    - "Yes"
    - "No"
