version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: retainiq-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-retainiq}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-retainiq_secure_pass}
      - POSTGRES_DB=${POSTGRES_DB:-customer_retention}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retainiq} -d ${POSTGRES_DB:-customer_retention}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: retainiq-backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-retainiq}:${POSTGRES_PASSWORD:-retainiq_secure_pass}@db:5432/${POSTGRES_DB:-customer_retention}
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-change-in-production-1234567890}
      - APP_ENV=${APP_ENV:-production}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8501,http://127.0.0.1:8501,https://retainiq.com}
    volumes:
      - ../backend/logs:/app/backend/logs
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    container_name: retainiq-frontend
    environment:
      - API_BASE_URL=http://backend:8000
    ports:
      - "${FRONTEND_PORT:-8501}:8501"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8501/')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always

  nginx:
    image: nginx:alpine
    container_name: retainiq-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: always

volumes:
  pgdata:

